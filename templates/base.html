<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg.name }}</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 12px; background: #fafafa; color: #222; }
    h1 { margin-bottom: 6px; }
    h2, h3 { margin-top: 0; }
    a { color: #0645ad; }
    nav { margin: 14px 0 18px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    nav a { text-decoration: none; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; background: white; color: #222; }
    nav a.active { background: #222; color: white; border-color: #222; }
    button { font-size: 16px; padding: 9px 14px; margin: 4px; cursor: pointer; border: 1px solid #aaa; border-radius: 6px; background: white; }
    button.primary { background: #222; color: white; border-color: #222; }
    input, select, textarea { font-size: 16px; padding: 7px; width: 100%; box-sizing: border-box; margin: 4px 0 10px; border: 1px solid #bbb; border-radius: 5px; }
    textarea { height: 110px; font-family: Consolas, monospace; }
    label { font-weight: 600; }
    .box { border: 1px solid #ddd; background: white; padding: 15px; margin: 15px 0; border-radius: 10px; }
    .status { font-size: 15px; display: flex; flex-wrap: wrap; gap: 12px; }
    .pill { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #eee; }
    .ok { color: #137333; font-weight: bold; }
    .muted { color: #666; }
    .danger { color: #b3261e; font-weight: bold; }
    .warn { color: #b26a00; font-weight: bold; }
    .input-row { border-top: 1px solid #eee; padding: 15px 0; }
    .input-row:first-child { border-top: 0; }
    .grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .actions { margin-top: 10px; }
    .inline-checkbox { width: auto; margin-right: 6px; }
    code { font-size: 17px; }
    pre { white-space: pre-wrap; background: #111; color: #eee; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .sequence-buttons form { display: inline; }
    .live-status { font-weight: bold; }
    .live-event { color: #555; font-size: 14px; margin-left: 6px; }
    .live-count { color: #555; font-size: 14px; margin-left: 6px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    .advanced { margin: 12px 0; padding: 10px; border: 1px dashed #bbb; border-radius: 8px; }
    .advanced summary { cursor: pointer; font-weight: bold; }
    .nav-spacer { flex: 1; }
    .logout-form { display: inline; margin: 0; }
    .logout-form button { font-size: 14px; padding: 7px 10px; margin: 0; }
</style>
</head>
<body>
  <h1>{{ cfg.name }}</h1>

  <nav>
    <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/inputs" class="{% if active_page == 'inputs' %}active{% endif %}">Inputs</a>
    <a href="/settings" class="{% if active_page == 'settings' %}active{% endif %}">Settings</a>
    <a href="/logs" class="{% if active_page == 'logs' %}active{% endif %}">Logs</a>
    <a href="/diagnostics" class="{% if active_page == 'diagnostics' %}active{% endif %}">Diagnostics</a>
    <a href="/system" class="{% if active_page == 'system' %}active{% endif %}">System</a>
    <span class="nav-spacer"></span>
    {% if auth_enabled %}
      <span class="muted">User: <b>{{ auth_user }}</b></span>
      <form class="logout-form" method="post" action="/logout">
        <button type="submit">Logout</button>
      </form>
    {% endif %}
  </nav>

  <div class="box status">
    <span>WEB: <b class="{% if status.web == 'active' %}ok{% else %}danger{% endif %}">{{ status.web }}</b></span>
    <span>GPIO: <b class="{% if status.gpio == 'active' %}ok{% else %}danger{% endif %}">{{ status.gpio }}</b></span>
    <span>Logging: <b>{{ "ON" if status.logging else "OFF" }}</b></span>
    <span>IP: <b>{{ status.ip }}</b></span>
  </div>

  {% block content %}{% endblock %}


  <script>
    function updateLiveInput(inp) {
      const selector = `[data-live-input-name="${CSS.escape(inp.name)}"]`;
      document.querySelectorAll(selector).forEach((row) => {
        const status = row.querySelector('.live-status');
        const eventEl = row.querySelector('.live-event');
        const countEl = row.querySelector('.live-count');

        if (status) {
          if (inp.pressed) {
            status.textContent = 'PRESSED';
            status.classList.remove('muted');
            status.classList.add('ok');
          } else {
            status.textContent = 'RELEASED';
            status.classList.remove('ok');
            status.classList.add('muted');
          }
        }

        if (eventEl) {
          const t = inp.last_event_time ? inp.last_event_time.replace('T', ' ') : '-';
          eventEl.textContent = `last: ${inp.last_event || '-'} ${t}`;
        }

        if (countEl) {
          countEl.textContent = `press: ${inp.press_count || 0} / release: ${inp.release_count || 0}`;
        }
      });
    }

    function startEventStream() {
      if (!window.EventSource) return;

      const source = new EventSource('/events');

      source.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.type === 'gpio_status') {
          data.inputs.forEach(updateLiveInput);
        }
      };

      source.onerror = function() {
        console.log('SSE disconnected; browser will retry automatically');
      };
    }

    document.addEventListener('DOMContentLoaded', startEventStream);
  </script>
</body>
</html>
