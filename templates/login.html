<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - {{ cfg.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page" style="max-width: 460px; padding-top: 70px;">
    <div class="card">
      <h1>{{ cfg.name }}</h1>
      <p class="muted">Sign in to manage this controller.</p>

      {% if error %}
        <p class="danger">{{ error }}</p>
      {% endif %}

      <form method="post">
        <label>Username</label>
        <input name="username" value="admin" autocomplete="username" autofocus>

        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password">

        <button type="submit" class="primary">Login</button>
      </form>

      <p class="muted">Default credentials: admin / showcontroller</p>
    </div>
  </main>
</body>
</html>
