<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - {{ cfg.name }}</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 12px; background: #fafafa; color: #222; }
    .box { border: 1px solid #ddd; background: white; padding: 20px; border-radius: 10px; }
    input { font-size: 16px; padding: 8px; width: 100%; box-sizing: border-box; margin: 5px 0 14px; border: 1px solid #bbb; border-radius: 5px; }
    button { font-size: 16px; padding: 9px 14px; cursor: pointer; border: 1px solid #222; border-radius: 6px; background: #222; color: white; }
    label { font-weight: 600; }
    .danger { color: #b3261e; font-weight: bold; }
    .muted { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>{{ cfg.name }}</h1>
    <h2>Login</h2>

    {% if error %}
      <p class="danger">{{ error }}</p>
    {% endif %}

    <form method="post">
      <label>Username</label>
      <input name="username" value="admin" autocomplete="username" autofocus>

      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password">

      <button type="submit">Login</button>
    </form>

    <p class="muted">Default credentials: admin / showcontroller</p>
  </div>
</body>
</html>
